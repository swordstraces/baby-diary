services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: baby
      POSTGRES_PASSWORD: baby
      POSTGRES_DB: babytracker
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U baby -d babytracker']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    environment:
      DATABASE_URL: postgresql://baby:baby@db:5432/babytracker
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-string}
      HOST: 0.0.0.0
      PORT: 3000
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:8080}
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./web
    ports:
      - '${WEB_PORT:-8080}:80'
    depends_on:
      - api

volumes:
  pgdata:
